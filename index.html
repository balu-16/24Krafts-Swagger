<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24Krafts API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css">
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-dark: #1d4ed8;
      --bg-light: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .hero .version {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      margin-left: 8px;
      vertical-align: middle;
    }

    .hero p {
      margin: 0 0 20px 0;
      opacity: 0.9;
      font-size: 1rem;
    }

    .hero .base-url {
      display: inline-block;
      background: rgba(0,0,0,0.2);
      padding: 8px 16px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
    }

    .quick-info {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .quick-info .item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #374151;
    }

    .quick-info .item code {
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #1e3a5f;
    }

    .quick-info .item .label {
      font-weight: 600;
      color: #1e3a5f;
    }

    .swagger-ui .topbar {
      display: none;
    }

    .swagger-ui .info {
      display: none;
    }

    .swagger-ui .info .title {
      font-size: 2.5rem;
      color: #3b4151;
    }

    .swagger-ui .info .description p {
      font-size: 1rem;
      color: #3b4151;
    }

    .swagger-ui .scheme-container {
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      padding: 20px;
    }

    .swagger-ui .opblock-tag {
      font-size: 1.3rem;
      font-weight: 600;
      border-bottom: 1px solid #e8e8e8;
      padding: 15px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .swagger-ui .opblock-tag:hover {
      background: #f8f8f8;
    }

    .swagger-ui .opblock {
      margin: 0 0 10px 0;
      border-radius: 4px;
      box-shadow: 0 0 3px rgba(0,0,0,0.1);
    }

    .swagger-ui .opblock .opblock-summary {
      padding: 10px 15px;
      cursor: pointer;
    }

    .swagger-ui .opblock .opblock-summary-method {
      font-size: 14px;
      font-weight: 700;
      min-width: 80px;
      padding: 6px 15px;
      text-align: center;
      border-radius: 3px;
    }

    .swagger-ui .opblock.opblock-get .opblock-summary-method {
      background: #61affe;
    }

    .swagger-ui .opblock.opblock-post .opblock-summary-method {
      background: #49cc90;
    }

    .swagger-ui .opblock.opblock-put .opblock-summary-method {
      background: #fca130;
    }

    .swagger-ui .opblock.opblock-delete .opblock-summary-method {
      background: #f93e3e;
    }

    .swagger-ui .opblock .opblock-summary-path {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
    }

    .swagger-ui .opblock .opblock-summary-description {
      font-size: 13px;
      color: #666;
    }

    .swagger-ui .btn.execute {
      background-color: #4990e2;
      border-color: #4990e2;
      color: #fff;
      font-weight: 700;
      padding: 8px 40px;
    }

    .swagger-ui .btn.execute:hover {
      background-color: #357abd;
    }

    .swagger-ui .btn.try-out__btn {
      border: 2px solid #6c757d;
      color: #6c757d;
      background: transparent;
      padding: 8px 20px;
      font-weight: 600;
    }

    .swagger-ui .btn.try-out__btn:hover {
      background: #6c757d;
      color: #fff;
    }

    .swagger-ui .btn.try-out__btn.cancel {
      border-color: #dc3545;
      color: #dc3545;
    }

    .swagger-ui .btn.try-out__btn.cancel:hover {
      background: #dc3545;
      color: #fff;
    }

    .swagger-ui .authorization__btn {
      background: #49cc90;
      border-color: #49cc90;
      color: #fff;
    }

    .swagger-ui .auth-wrapper .authorize {
      padding-right: 20px;
    }

    .swagger-ui .model-box {
      background: #f5f5f5;
      border-radius: 4px;
    }

    .swagger-ui section.models {
      border: 1px solid #e8e8e8;
      border-radius: 4px;
    }

    .swagger-ui .response-col_status {
      font-size: 14px;
      font-weight: 600;
    }

    .swagger-ui table tbody tr td {
      padding: 10px;
    }

    .swagger-ui .parameter__name {
      font-weight: 600;
      font-size: 14px;
    }

    .swagger-ui .parameter__type {
      font-size: 12px;
      color: #666;
    }

    .swagger-ui textarea {
      font-family: monospace;
      font-size: 13px;
    }

    .swagger-ui .opblock-body pre {
      font-size: 13px;
      background: #2d2d2d;
      color: #f8f8f2;
      border-radius: 4px;
    }

    .swagger-ui .responses-inner {
      padding: 20px;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <header class="hero">
    <h1>24Krafts API <span class="version">v1.0.0</span></h1>
    <p>Complete API documentation for the 24Krafts mobile application</p>
    <div class="base-url">https://24-krafts-backend.vercel.app/api</div>
  </header>

  <!-- Quick Info Bar -->
  <div class="quick-info">
    <div class="item">
      <span class="label">JWT Auth:</span>
      <code>Authorization: Bearer &lt;token&gt;</code>
    </div>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
  <script>
    // Embedded OpenAPI Specification
    const spec = {
      "openapi": "3.0.3",
      "info": {
        "title": "24Krafts API",
        "version": "1.0.0",
        "description": "Complete API documentation for the 24Krafts mobile application.\n\n## Authentication\nThis API uses JWT Bearer authentication:\n- **JWT Auth**: `Authorization: Bearer <jwt_token>` - Used for all authenticated endpoints\n\n## Base URL\n`https://24-krafts-backend.vercel.app/api`\n\n## Getting Started\n\n**For New Users:**\n1. Send OTP using `/auth/send-otp`\n2. Verify OTP using `/auth/verify-otp` (returns `isNewUser: true`)\n3. Complete signup with `/auth/signup` using the same OTP\n4. Use the JWT token from signup for subsequent requests\n\n**For Existing Users:**\n1. Send OTP using `/auth/send-otp`\n2. Verify OTP using `/auth/verify-otp` (returns `isNewUser: false` with JWT token)\n3. Use the JWT token for subsequent requests"
      },
      "servers": [
        {
          "url": "https://24-krafts-backend.vercel.app/api",
          "description": "Production Server"
        }
      ],
      "tags": [
        {"name": "Health", "description": "Health check endpoints"},
        {"name": "Auth", "description": "Authentication endpoints"},
        {"name": "Users", "description": "User management"},
        {"name": "Profiles", "description": "Profile management"},
        {"name": "Posts", "description": "Posts and project applications"},
        {"name": "Projects", "description": "Project management"},
        {"name": "Chat", "description": "Conversations and messaging"},
        {"name": "Schedules", "description": "Schedule management"},
        {"name": "Uploads", "description": "File uploads"},
        {"name": "Notifications", "description": "Push notification management"},
        {"name": "Admin", "description": "Admin endpoints"}
      ],
      "components": {
        "securitySchemes": {
          "BearerAuth": {
            "type": "http",
            "scheme": "bearer",
            "bearerFormat": "JWT"
          }
        },
        "schemas": {
          "SendOtpRequest": {
            "type": "object",
            "required": ["phone"],
            "properties": {
              "phone": {"type": "string", "example": "9876543210", "description": "10-digit Indian mobile number"}
            }
          },
          "VerifyOtpRequest": {
            "type": "object",
            "required": ["phone", "otp"],
            "properties": {
              "phone": {"type": "string", "example": "9876543210"},
              "otp": {"type": "string", "example": "123456", "minLength": 6, "maxLength": 6}
            }
          },
          "SignupRequest": {
            "type": "object",
            "required": ["phone", "otp", "firstName", "email", "gender", "department", "state", "city", "role", "aadharNumber"],
            "properties": {
              "phone": {"type": "string", "example": "9876543210"},
              "otp": {"type": "string", "example": "123456"},
              "firstName": {"type": "string", "example": "John"},
              "lastName": {"type": "string", "example": "Doe"},
              "email": {"type": "string", "format": "email", "example": "john@example.com"},
              "alternativePhone": {"type": "string"},
              "maaAssociativeNumber": {"type": "string"},
              "gender": {"type": "string", "enum": ["Male", "Female", "Non-binary", "Prefer not to say"]},
              "department": {"type": "string", "example": "Acting"},
              "state": {"type": "string", "example": "Maharashtra"},
              "city": {"type": "string", "example": "Mumbai"},
              "profilePhoto": {"type": "string", "description": "Base64 encoded image"},
              "role": {"type": "string", "enum": ["artist", "recruiter"]},
              "companyName": {"type": "string"},
              "companyPhone": {"type": "string"},
              "companyEmail": {"type": "string"},
              "companyLogo": {"type": "string"},
              "website": {"type": "string"},
              "facebook": {"type": "string"},
              "twitter": {"type": "string"},
              "instagram": {"type": "string"},
              "youtube": {"type": "string"},
              "customLinks": {"type": "array", "items": {"type": "string"}},
              "aadharNumber": {"type": "string", "minLength": 16, "maxLength": 16, "example": "1234567890123456"},
              "bio": {"type": "string"}
            }
          },
          "UpdateProfileRequest": {
            "type": "object",
            "properties": {
              "first_name": {"type": "string"},
              "last_name": {"type": "string"},
              "email": {"type": "string"},
              "phone": {"type": "string"},
              "alt_phone": {"type": "string"},
              "maa_associative_number": {"type": "string"},
              "gender": {"type": "string"},
              "department": {"type": "string"},
              "state": {"type": "string"},
              "city": {"type": "string"},
              "bio": {"type": "string"},
              "profile_photo_url": {"type": "string"},
              "company_id": {"type": "string", "format": "uuid"}
            }
          },
          "BecomeRecruiterRequest": {
            "type": "object",
            "required": ["companyName"],
            "properties": {
              "companyName": {"type": "string"},
              "companyPhone": {"type": "string"},
              "companyEmail": {"type": "string"},
              "companyLogo": {"type": "string"}
            }
          },
          "UpgradePremiumRequest": {
            "type": "object",
            "required": ["planType"],
            "properties": {
              "planType": {"type": "string", "enum": ["monthly", "yearly"]},
              "paymentId": {"type": "string"}
            }
          },
          "CreatePostRequest": {
            "type": "object",
            "required": ["title", "description"],
            "properties": {
              "title": {"type": "string", "example": "Looking for actors"},
              "description": {"type": "string", "example": "We need talented actors for our upcoming project"},
              "requirements": {"type": "string"},
              "location": {"type": "string"},
              "department": {"type": "string"},
              "departments": {"type": "array", "items": {"type": "string"}},
              "deadline": {"type": "string", "format": "date-time"},
              "image": {"type": "string", "description": "Base64 encoded image"},
              "caption": {"type": "string"},
              "status": {"type": "string", "enum": ["open", "closed", "in_progress", "completed"]}
            }
          },
          "UpdatePostRequest": {
            "type": "object",
            "properties": {
              "title": {"type": "string"},
              "description": {"type": "string"},
              "requirements": {"type": "string"},
              "location": {"type": "string"},
              "department": {"type": "string"},
              "departments": {"type": "array", "items": {"type": "string"}},
              "deadline": {"type": "string", "format": "date-time"},
              "status": {"type": "string", "enum": ["open", "closed", "in_progress", "completed"]}
            }
          },
          "CreateCommentRequest": {
            "type": "object",
            "required": ["content"],
            "properties": {
              "content": {"type": "string", "example": "Great opportunity!"}
            }
          },
          "ApplyToProjectRequest": {
            "type": "object",
            "properties": {
              "cover_letter": {"type": "string"},
              "portfolio_link": {"type": "string"}
            }
          },
          "UpdateApplicationStatusRequest": {
            "type": "object",
            "required": ["status"],
            "properties": {
              "status": {"type": "string", "enum": ["pending", "accepted", "rejected", "withdrawn"]}
            }
          },
          "CreateProjectRequest": {
            "type": "object",
            "required": ["title"],
            "properties": {
              "title": {"type": "string"},
              "description": {"type": "string"},
              "image": {"type": "string"},
              "start_date": {"type": "string", "format": "date"},
              "end_date": {"type": "string", "format": "date"}
            }
          },
          "AddProjectMemberRequest": {
            "type": "object",
            "required": ["profile_id"],
            "properties": {
              "profile_id": {"type": "string", "format": "uuid"},
              "role_in_project": {"type": "string"}
            }
          },
          "CreateConversationRequest": {
            "type": "object",
            "required": ["member_ids"],
            "properties": {
              "is_group": {"type": "boolean", "default": false},
              "name": {"type": "string"},
              "member_ids": {"type": "array", "items": {"type": "string", "format": "uuid"}}
            }
          },
          "SendMessageRequest": {
            "type": "object",
            "required": ["content"],
            "properties": {
              "content": {"type": "string", "example": "Hello!"},
              "metadata": {"type": "object"},
              "client_msg_id": {"type": "string"}
            }
          },
          "UpdateTypingRequest": {
            "type": "object",
            "required": ["is_typing"],
            "properties": {
              "is_typing": {"type": "boolean"}
            }
          },
          "CreateScheduleRequest": {
            "type": "object",
            "required": ["project_id", "date"],
            "properties": {
              "project_id": {"type": "string", "format": "uuid"},
              "title": {"type": "string"},
              "description": {"type": "string"},
              "date": {"type": "string", "format": "date"},
              "start_time": {"type": "string", "example": "09:00"},
              "end_time": {"type": "string", "example": "17:00"},
              "location": {"type": "string"}
            }
          },
          "AddScheduleMemberRequest": {
            "type": "object",
            "required": ["profile_id"],
            "properties": {
              "profile_id": {"type": "string", "format": "uuid"}
            }
          },
          "UpdateScheduleMemberStatusRequest": {
            "type": "object",
            "required": ["status"],
            "properties": {
              "status": {"type": "string", "enum": ["accepted", "declined", "pending"]}
            }
          },
          "SaveTokenRequest": {
            "type": "object",
            "required": ["token", "platform"],
            "properties": {
              "token": {"type": "string"},
              "platform": {"type": "string", "enum": ["ios", "android"]},
              "device_name": {"type": "string"},
              "app_version": {"type": "string"},
              "os_version": {"type": "string"},
              "timezone": {"type": "string"}
            }
          },
          "RevokeTokenRequest": {
            "type": "object",
            "required": ["token"],
            "properties": {
              "token": {"type": "string"}
            }
          },
          "SendPushRequest": {
            "type": "object",
            "required": ["tokens", "title", "body"],
            "properties": {
              "tokens": {"type": "array", "items": {"type": "string"}},
              "title": {"type": "string"},
              "body": {"type": "string"},
              "data": {
                "type": "object",
                "properties": {
                  "route": {"type": "string"},
                  "id": {"type": "string"}
                }
              }
            }
          }
        }
      },
      "paths": {
        "/health": {
          "get": {
            "tags": ["Health"],
            "summary": "Health check",
            "description": "Check if the API server is running and healthy",
            "responses": {
              "200": {
                "description": "API is healthy",
                "content": {
                  "application/json": {
                    "schema": {
                      "type": "object",
                      "properties": {
                        "status": {"type": "string", "example": "ok"},
                        "timestamp": {"type": "string", "example": "2024-01-15T10:30:00.000Z"},
                        "service": {"type": "string", "example": "24Krafts Backend API"}
                      }
                    }
                  }
                }
              }
            }
          }
        },
        "/auth/send-otp": {
          "post": {
            "tags": ["Auth"],
            "summary": "Send OTP",
            "description": "Send a 6-digit OTP to the provided Indian mobile number via SMS",
            "requestBody": {
              "required": true,
              "content": {
                "application/json": {
                  "schema": {"$ref": "#/components/schemas/SendOtpRequest"},
                  "example": {"phone": "9876543210"}
                }
              }
            },
            "responses": {
              "200": {
                "description": "OTP sent successfully",
                "content": {
                  "application/json": {
                    "schema": {
                      "type": "object",
                      "properties": {
                        "success": {"type": "boolean", "example": true},
                        "message": {"type": "string", "example": "OTP sent successfully"},
                        "phoneNumber": {"type": "string", "example": "9876543210"},
                        "userExists": {"type": "boolean", "example": false}
                      }
                    }
                  }
                }
              },
              "400": {"description": "Invalid phone number format"}
            }
          }
        },
        "/auth/verify-otp": {
          "post": {
            "tags": ["Auth"],
            "summary": "Verify OTP",
            "description": "Verify the OTP sent to the phone number. For existing users, returns isNewUser: false with a JWT token. For new users, returns isNewUser: true indicating that /auth/signup should be called next. Note: The OTP remains valid for signup even after verification, allowing the user to proceed with /auth/signup using the same OTP.",
            "requestBody": {
              "required": true,
              "content": {
                "application/json": {
                  "schema": {"$ref": "#/components/schemas/VerifyOtpRequest"},
                  "example": {"phone": "9876543210", "otp": "123456"}
                }
              }
            },
            "responses": {
              "200": {
                "description": "OTP verified",
                "content": {
                  "application/json": {
                    "schema": {
                      "type": "object",
                      "properties": {
                        "success": {"type": "boolean"},
                        "isNewUser": {"type": "boolean"},
                        "token": {"type": "string"},
                        "user": {"type": "object"}
                      }
                    }
                  }
                }
              },
              "400": {"description": "Invalid or expired OTP"}
            }
          }
        },
        "/auth/signup": {
          "post": {
            "tags": ["Auth"],
            "summary": "Complete signup",
            "description": "Complete user registration with all required details. This endpoint accepts the same OTP that was sent via /auth/send-otp, even if it was already verified through /auth/verify-otp. Typical flow: 1) Call /auth/send-otp to receive an OTP, 2) Call /auth/verify-otp to verify the OTP (returns isNewUser: true for new users), 3) Call /auth/signup with the same OTP and user details to complete registration.",
            "requestBody": {
              "required": true,
              "content": {
                "application/json": {
                  "schema": {"$ref": "#/components/schemas/SignupRequest"}
                }
              }
            },
            "responses": {
              "201": {
                "description": "User registered successfully",
                "content": {
                  "application/json": {
                    "schema": {
                      "type": "object",
                      "properties": {
                        "success": {"type": "boolean"},
                        "token": {"type": "string"},
                        "user": {"type": "object"},
                        "profile": {"type": "object"}
                      }
                    }
                  }
                }
              },
              "400": {"description": "Validation error"}
            }
          }
        },
        "/auth/profile": {
          "get": {
            "tags": ["Auth"],
            "summary": "Get current user profile",
            "description": "Get the authenticated user's profile details",
            "security": [{"BearerAuth": []}],
            "responses": {
              "200": {"description": "User profile returned"},
              "401": {"description": "Unauthorized"}
            }
          }
        },
        "/auth/cleanup-otps": {
          "post": {
            "tags": ["Auth"],
            "summary": "Cleanup expired OTPs",
            "description": "Remove expired OTP records from database (maintenance endpoint)",
            "responses": {
              "200": {"description": "Cleanup successful"}
            }
          }
        },
        "/users/{id}": {
          "get": {
            "tags": ["Users"],
            "summary": "Get user by ID",
            "description": "Retrieve user details by their UUID",
            "security": [{"BearerAuth": []}],
            "parameters": [
              {"name": "id", "in": "path", "required": true, "schema": {"type": "string", "format": "uuid"}}
            ],
            "responses": {
              "200": {"description": "User found"},
              "404": {"description": "User not found"}
            }
          }
        },
        "/profiles": {
          "get": {
            "tags": ["Profiles"],
            "summary": "List all profiles",
            "description": "Get paginated list of all user profiles",
            "security": [{"BearerAuth": []}],
            "parameters": [
              {"name": "cursor", "in": "query", "schema": {"type": "string"}, "description": "Pagination cursor"},
              {"name": "limit", "in": "query", "schema": {"type": "integer", "default": 20}, "description": "Number of results"},
              {"name": "role", "in": "query", "schema": {"type": "string", "enum": ["artist", "recruiter"]}, "description": "Filter by role"}
            ],
            "responses": {
              "200": {
                "description": "List of profiles",
                "content": {
                  "application/json": {
                    "schema": {
                      "type": "object",
                      "properties": {
                        "data": {"type": "array", "items": {"type": "object"}},
                        "nextCursor": {"type": "string"},
                        "hasMore": {"type": "boolean"}
                      }
                    }
                  }
                }
              }
            }
          }
        },
        "/profiles/{id}": {
          "get": {
            "tags": ["Profiles"],
            "summary": "Get profile by ID",
            "description": "Get detailed profile information",
            "security": [{"BearerAuth": []}],
            "parameters": [
